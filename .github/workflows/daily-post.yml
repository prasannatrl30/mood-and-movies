name: Daily Instagram post

on:
  schedule:
    # GitHub cron is UTC and best-effort (top-of-hour slots get heavily delayed),
    # so we fire several times off the :00 mark across the window that contains
    # 5PM Sydney — 06:xx UTC during AEDT (summer, UTC+11) and 07:xx UTC during
    # AEST (winter, UTC+10). The gate below only proceeds when the real Sydney
    # hour is 17 or 18, and a same-day dedup guard in the script guarantees it
    # posts at most once a day no matter how many firings land.
    - cron: '7 6 * * *'
    - cron: '37 6 * * *'
    - cron: '7 7 * * *'
    - cron: '37 7 * * *'
  workflow_dispatch: # manual "Run workflow" button for testing

permissions:
  contents: write # to commit the rendered card + state back to the repo

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on 5PM Australia/Sydney
        id: gate
        run: |
          HOUR=$(TZ=Australia/Sydney date +%H)
          echo "Sydney hour is $HOUR"
          # Accept 17 and 18 to absorb GitHub's cron delays; the script's
          # same-day dedup guard prevents any double-post within that window.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$HOUR" = "17" ] || [ "$HOUR" = "18" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "Outside the 5PM Sydney window — skipping this trigger."
          fi

      - name: Checkout
        if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install a serif font for the card
        if: steps.gate.outputs.go == 'true'
        run: sudo apt-get update && sudo apt-get install -y fonts-ebgaramond

      - name: Install dependencies
        if: steps.gate.outputs.go == 'true'
        run: npm install --no-audit --no-fund

      - name: Render today's card
        if: steps.gate.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          IG_HANDLE: ${{ vars.IG_HANDLE }}
        run: node scripts/daily-post.mjs --dry-run

      - name: Commit & push the card
        if: steps.gate.outputs.go == 'true'
        id: push
        run: |
          git config user.name "show-finder-bot"
          git config user.email "actions@github.com"
          git add posts/
          git commit -m "Daily post card $(TZ=Australia/Sydney date +%Y-%m-%d)" || echo "nothing to commit"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish to Instagram
        if: steps.gate.outputs.go == 'true'
        env:
          IG_USER_ID: ${{ vars.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Immutable raw URL pinned to the commit we just pushed, so Instagram
          # always fetches today's card (never a cached older one).
          CARD_IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.push.outputs.sha }}/posts/latest.jpg
        run: node scripts/daily-post.mjs --publish-only

      - name: Save updated state
        if: steps.gate.outputs.go == 'true'
        run: |
          git add posts/state.json
          git commit -m "Record posted title" || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Build notification email
        if: steps.gate.outputs.go == 'true'
        id: email_data
        run: |
          if [ ! -f posts/.just-posted ]; then
            echo "No fresh post this run — skipping email."
            echo "send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "send=true" >> "$GITHUB_OUTPUT"

          TITLE=$(jq -r '.title' posts/latest-meta.json)
          MODE=$(jq -r  '.mode'  posts/latest-meta.json)
          POST_URL=$(cat posts/.just-posted)
          CARD_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.push.outputs.sha }}/posts/latest.jpg"
          EYEBROW=$([ "$MODE" = "resurface" ] && echo "From my shelf" || echo "Discover")
          CAPTION=$(cat posts/latest-caption.txt)

          echo "subject=🎬 Today's pick: $TITLE" >> "$GITHUB_OUTPUT"

          cat > posts/.email-body.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <body style="margin:0;padding:0;background:#0f0e0d;font-family:Georgia,serif">
            <div style="max-width:480px;margin:32px auto;background:#161311;border-radius:12px;overflow:hidden;color:#f2e9dc">
              <img src="$CARD_URL" style="width:100%;display:block" alt="$TITLE card" />
              <div style="padding:24px">
                <p style="margin:0 0 6px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#e0a458">$EYEBROW</p>
                <h1 style="margin:0 0 16px;font-size:26px;line-height:1.2">$TITLE</h1>
                <pre style="margin:0 0 20px;white-space:pre-wrap;font-family:Georgia,serif;font-size:14px;color:#9a8c79;line-height:1.6">$CAPTION</pre>
                <a href="$POST_URL" style="display:inline-block;background:#e0a458;color:#161311;padding:11px 22px;border-radius:6px;text-decoration:none;font-weight:bold;font-size:14px">View on Instagram →</a>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Send post notification
        if: steps.gate.outputs.go == 'true' && steps.email_data.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: prasanna.trl@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.email_data.outputs.subject }}
          to: prasanna.trl@gmail.com
          from: Mood & Movies <prasanna.trl@gmail.com>
          html_body: file://posts/.email-body.html
